version: "3.9"

services:
  api1:
    image: gabrielsantoslima/rinha2026js
    container_name: api1
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: 120M

  api2:
    image: gabrielsantoslima/rinha2026js
    container_name: api2
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: 120M

  nginx:
    image: nginx:alpine
    container_name: nginx-lb
    ports:
      - "9999:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 110M

networks:
  rinha-net:
    driver: bridge
